description: |
  Zayo Group's commercial model is a sales-negotiated carrier contract; this
  artifact is a Contact Sales placeholder pending the customer's master service
  agreement.
sources:
  - https://www.zayo.com/products/
notes: |
  Zayo does not publish per-meter pricing publicly. Meter and FOCUS column values
  below are minimal placeholders pending the signed Zayo MSA / service order.
billingModel:
  pricingCategory: Contact Sales
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
focusColumns:
  ServiceName: Zayo Group
  ServiceCategory: Network Connectivity
  ProviderName: Zayo Group
  PublisherName: Zayo Group, LLC
  InvoiceIssuerName: Zayo Group, LLC
  BillingCurrency: USD
meters:
  - name: circuits
    description: Active circuits / wavelengths / dark fiber strands under contract; the
      typical primary line item on Zayo invoices.
    unit: circuit-month
    aggregation: count
    dimensions:
      - circuit_id
      - service_type
      - route
  - name: bandwidth
    description: Committed and burstable bandwidth on Ethernet / IP / dedicated internet
      services.
    unit: Mbps
    aggregation: max
    dimensions:
      - circuit_id
      - service_type
principles:
  - name: Visibility
    description: Visibility comes from monthly Tranzact / customer-portal invoices and
      service inventory; Zayo does not expose a public usage API.
  - name: Allocation
    description: Allocate spend by circuit ID, route (A-Z endpoints), and consuming
      business unit / data center.
  - name: Optimization
    description: Optimize via term length (1 / 3 / 5 year), grooming under-utilized
      circuits, and consolidating redundant routes during contract renewal.
  - name: Accountability
    description: Spend ownership sits with the network / infrastructure lead who signs
      the Zayo MSA and individual service orders.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com

specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Zayo Group Holdings
providerId: zayo-group
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Fiber
  - Network
  - Telecom
  - Rate Limiting
description: |
  Zayo Group does not publish API rate limits. The Tranzact partner API and any
  carrier-facing service APIs are partner-gated, with throttling enforced per partner
  agreement rather than via a public docs page.
sources:
  - https://www.zayo.com/products/
responseCodes:
  throttled: 429
limits:
  - name: Per-partner throttling (undocumented)
    scope: account
    metric: varies
    limit: see Zayo partner / Tranzact agreement
    notes: Zayo carrier APIs are not publicly documented; numbers are issued only to
      onboarded partners.
policies:
  - name: Partner gating
    description: API access requires an established carrier / partner relationship; rate
      limits are communicated through the Zayo account team.
  - name: Backoff
    description: Clients should implement exponential backoff with jitter on 429 / 5xx
      responses.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com

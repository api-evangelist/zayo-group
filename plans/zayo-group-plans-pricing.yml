description: |
  Zayo Group is an enterprise fiber / network connectivity provider that does not
  publish API or service pricing publicly. Commercial terms (dark fiber, wavelengths,
  Ethernet, IP, dedicated internet, cloud connect, Tranzact API access) are quoted
  via Zayo Sales per route, capacity, and term.
sources:
  - https://www.zayo.com/products/
notes: |
  WebFetch of zayo.com confirmed there is no public price card or self-serve developer
  pricing — the site directs all inquiries to "Contact Us". Treated as B2B carrier
  contact-sales.
plans:
  - id: zayo-group-contact-sales
    name: Contact Sales
    type: enterprise
    description: All Zayo network and Tranzact API commercial terms are quoted directly
      by Zayo Sales based on route, capacity, term, and SLA.
    entries:
      - label: Custom Commercial Terms
        name: custom
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Dark fiber and wavelength services
      - name: Ethernet, IP, and dedicated internet access
      - name: Cloud connect and managed services
      - name: Tranzact partner API enablement
